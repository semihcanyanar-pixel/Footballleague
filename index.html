<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FootballIQ">
<title>FootballIQ</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080c17;--surface:#0f1623;--surface2:#172030;--border:#1e2d40;
  --accent:#00e5a0;--accent2:#0088ff;--gold:#f0b429;--red:#f04444;--yellow:#fbbf24;
  --text:#dde6f0;--text2:#7a8fa5;--text3:#3d5060;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;user-select:none}
#app{display:flex;height:100vh;overflow:hidden}

/* LEFT */
#lp{width:240px;min-width:240px;background:var(–surface);border-right:1px solid var(–border);display:flex;flex-direction:column;overflow:hidden;transition:width .28s,min-width .28s}
#lp.col{width:0;min-width:0}
.ph{padding:14px 15px;border-bottom:1px solid var(–border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:‘Bebas Neue’,cursive;font-size:22px;color:var(–accent);letter-spacing:2px}
.logo span{color:var(–accent2)}
.settings-btn{background:none;border:none;color:var(–text3);font-size:16px;cursor:pointer;padding:2px}
.sb{margin:10px 11px;position:relative;flex-shrink:0}
.sb input{width:100%;background:var(–surface2);border:1px solid var(–border);border-radius:8px;color:var(–text);padding:8px 10px 8px 30px;font-size:13px;outline:none;font-family:‘DM Sans’,sans-serif;transition:border-color .2s}
.sb input:focus{border-color:var(–accent)}
.sb input::placeholder{color:var(–text3)}
.sb::before{content:‘🔍’;position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:11px;opacity:.4}
.sl{padding:7px 15px 3px;font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(–text3);text-transform:uppercase;flex-shrink:0}
#ll{overflow-y:auto;flex:1}
#ll::-webkit-scrollbar{width:3px}
#ll::-webkit-scrollbar-thumb{background:var(–border);border-radius:3px}
.li{display:flex;align-items:center;gap:8px;padding:7px 13px;cursor:pointer;border-radius:6px;margin:1px 7px;transition:background .15s;font-size:13px}
.li:hover{background:var(–surface2)}
.li.active{background:rgba(0,229,160,.08);color:var(–accent)}
.lf{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.ln{flex:1;font-weight:500}
.la{color:var(–text3);font-size:10px;transition:transform .2s;flex-shrink:0}
.li.open .la{transform:rotate(90deg)}
.tsl{display:none}.tsl.open{display:block}
.ti{display:flex;align-items:center;padding:6px 13px 6px 36px;cursor:pointer;font-size:12px;color:var(–text2);transition:background .15s,color .15s;border-radius:6px;margin:1px 7px}
.ti:hover{background:var(–surface2);color:var(–text)}
.ti.active{color:var(–accent);font-weight:600}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{height:52px;display:flex;align-items:center;padding:0 13px;gap:10px;border-bottom:1px solid var(–border);background:var(–surface);flex-shrink:0}
.hb{background:none;border:none;color:var(–text2);font-size:20px;cursor:pointer;padding:4px;flex-shrink:0}
#tt{font-family:‘Bebas Neue’,cursive;font-size:20px;letter-spacing:1px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#fsel{display:flex;align-items:center;gap:5px;background:var(–surface2);border:1px solid var(–border);border-radius:8px;padding:6px 11px;cursor:pointer;font-size:13px;font-weight:700;color:var(–accent);transition:border-color .2s;flex-shrink:0}
#fsel:hover{border-color:var(–accent)}

/* PITCH */
#pc{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:9px;gap:8px}
#pw{flex:1;position:relative;min-height:0}
#pitch{
width:100%;height:100%;border-radius:14px;position:relative;overflow:hidden;
border:2px solid rgba(255,255,255,.08);
box-shadow:0 12px 40px rgba(0,0,0,.6),inset 0 0 80px rgba(0,0,0,.25);
background:
repeating-linear-gradient(0deg,transparent,transparent 52px,rgba(0,0,0,.04) 52px,rgba(0,0,0,.04) 104px),
linear-gradient(180deg,#1a6b1a,#1e7a1e 35%,#217821 65%,#1a6b1a);
}
.pcl{position:absolute;top:50%;left:0;right:0;height:2px;background:rgba(255,255,255,.14)}
.pcc{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:17%;aspect-ratio:1;border:2px solid rgba(255,255,255,.14);border-radius:50%}
.pcd{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:5px;height:5px;background:rgba(255,255,255,.35);border-radius:50%}
.ppt,.ppb{position:absolute;left:26%;right:26%;border:2px solid rgba(255,255,255,.14)}
.ppt{top:0;height:17%;border-top:none}.ppb{bottom:0;height:17%;border-bottom:none}
.pgt,.pgb{position:absolute;left:39%;right:39%;height:5%;border:2px solid rgba(255,255,255,.14)}
.pgt{top:0;border-top:none}.pgb{bottom:0;border-bottom:none}

/* PLAYER CARD */
.pcard{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;z-index:10;touch-action:none;transition:filter .15s}
.pcard .av{width:52px;height:52px;border-radius:50%;overflow:hidden;border:2.5px solid rgba(255,255,255,.8);background:var(–surface2);position:relative;box-shadow:0 3px 12px rgba(0,0,0,.65);transition:border-color .2s,transform .15s,box-shadow .15s}
.pcard:hover .av{border-color:var(–accent);transform:scale(1.07)}
.pcard.drag .av{border-color:var(–accent);box-shadow:0 0 22px rgba(0,229,160,.5);transform:scale(1.1)}
/* SELECTED state */
.pcard.selected .av{border-color:#fff;border-width:3px;box-shadow:0 0 0 3px var(–accent),0 4px 16px rgba(0,229,160,.6);transform:scale(1.12)}
.pcard.selected .pname{background:var(–accent);color:#000}
/* SWAP TARGET hint */
.pcard.swap-target .av{border-color:var(–yellow);box-shadow:0 0 0 2px var(–yellow),0 2px 10px rgba(251,191,36,.4)}

.av img{width:100%;height:100%;object-fit:cover;object-position:top center}
.av-init{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:‘Bebas Neue’,cursive;font-size:18px;color:var(–accent);background:var(–surface2)}
.posbadge{position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);background:var(–accent);color:#000;font-size:7px;font-weight:900;padding:1px 4px;border-radius:3px;white-space:nowrap}
.pname{background:rgba(0,0,0,.85);backdrop-filter:blur(6px);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap;max-width:82px;overflow:hidden;text-overflow:ellipsis;text-align:center;transition:background .2s,color .2s}
.pval{background:rgba(240,180,41,.12);border:1px solid rgba(240,180,41,.3);color:var(–gold);font-size:8px;font-weight:700;padding:1px 5px;border-radius:8px;white-space:nowrap}

/* LOADING */
#lo{position:absolute;inset:0;background:rgba(8,12,23,.9);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:50;border-radius:14px;gap:14px}
.spin{width:36px;height:36px;border:3px solid var(–border);border-top-color:var(–accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ltext{font-size:13px;color:var(–text2);text-align:center;max-width:220px;line-height:1.5}
#es{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(–text3);pointer-events:none}

/* SWAP HINT BANNER */
#swaphint{
position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
background:rgba(0,0,0,.85);backdrop-filter:blur(8px);
border:1px solid var(–accent);border-radius:20px;
padding:6px 16px;font-size:12px;font-weight:600;color:var(–accent);
pointer-events:none;white-space:nowrap;z-index:20;
opacity:0;transition:opacity .2s;
}
#swaphint.show{opacity:1}

/* BENCH */
#bp{height:110px;background:var(–surface);border-radius:10px;border:1px solid var(–border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.bh{padding:5px 13px;font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(–text3);text-transform:uppercase;border-bottom:1px solid var(–border);flex-shrink:0}
#bs{display:flex;gap:10px;padding:7px 11px;overflow-x:auto;flex:1;align-items:center}
#bs::-webkit-scrollbar{height:3px}
#bs::-webkit-scrollbar-thumb{background:var(–border);border-radius:3px}
.bpl{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;min-width:52px;transition:transform .15s}
.bpl:hover{transform:translateY(-2px)}
.bav{width:44px;height:44px;border-radius:50%;overflow:hidden;border:2px solid var(–border);background:var(–surface2);transition:border-color .2s,box-shadow .2s}
.bpl:hover .bav{border-color:var(–accent)}
.bpl.selected .bav{border-color:#fff;border-width:2.5px;box-shadow:0 0 0 2px var(–accent)}
.bpl.selected .bname{color:var(–accent)}
.bpl.swap-target .bav{border-color:var(–yellow);box-shadow:0 0 0 2px var(–yellow)}
.bav img{width:100%;height:100%;object-fit:cover;object-position:top center}
.bav-init{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:‘Bebas Neue’,cursive;font-size:14px;color:var(–accent)}
.bname{font-size:9px;color:var(–text2);text-align:center;white-space:nowrap;max-width:54px;overflow:hidden;text-overflow:ellipsis;transition:color .2s}
.bpos{font-size:8px;color:var(–text3);text-align:center}

/* FORMATION MODAL */
#fmod{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(12px);z-index:200;align-items:center;justify-content:center}
#fmod.open{display:flex}
.fbox{background:var(–surface);border:1px solid var(–border);border-radius:18px;padding:22px;width:330px;max-width:92vw}
.ftitle{font-family:‘Bebas Neue’,cursive;font-size:20px;letter-spacing:2px;margin-bottom:14px;color:var(–accent)}
.fgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.fbtn{background:var(–surface2);border:1px solid var(–border);border-radius:8px;color:var(–text);font-family:‘Bebas Neue’,cursive;font-size:18px;letter-spacing:1px;padding:11px 5px;cursor:pointer;text-align:center;transition:all .15s}
.fbtn:hover,.fbtn.active{border-color:var(–accent);color:var(–accent);background:rgba(0,229,160,.08)}
.fclose{margin-top:13px;width:100%;background:none;border:1px solid var(–border);border-radius:8px;color:var(–text2);font-size:14px;padding:9px;cursor:pointer;font-family:‘DM Sans’,sans-serif}

/* STATS MODAL */
#smod{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(14px);z-index:300;align-items:center;justify-content:center;padding:14px}
#smod.open{display:flex}
.sbox{background:var(–surface);border:1px solid var(–border);border-radius:20px;width:500px;max-width:96vw;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;position:relative}
.shdr{display:flex;align-items:center;gap:14px;padding:18px;border-bottom:1px solid var(–border);background:linear-gradient(135deg,var(–surface2),var(–surface));flex-shrink:0}
.savatar{width:72px;height:72px;border-radius:50%;overflow:hidden;border:3px solid var(–accent);flex-shrink:0;background:var(–surface2)}
.savatar img{width:100%;height:100%;object-fit:cover;object-position:top center}
.savatar-init{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:‘Bebas Neue’,cursive;font-size:26px;color:var(–accent)}
.sinfo{flex:1;min-width:0}
.sname{font-family:‘Bebas Neue’,cursive;font-size:23px;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.smeta{font-size:11px;color:var(–text2);margin-top:4px;display:flex;gap:5px;flex-wrap:wrap}
.smeta span{background:var(–surface2);padding:2px 7px;border-radius:10px;border:1px solid var(–border)}
.sval{background:linear-gradient(135deg,var(–gold),#c8920a);color:#000;font-weight:800;font-size:12px;padding:5px 11px;border-radius:16px;white-space:nowrap;flex-shrink:0}
.xcbtn{position:absolute;top:13px;right:13px;background:var(–surface2);border:1px solid var(–border);border-radius:50%;width:29px;height:29px;color:var(–text2);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:1;transition:all .2s}
.xcbtn:hover{border-color:var(–red);color:var(–red)}
.stabs{display:flex;border-bottom:1px solid var(–border);overflow-x:auto;flex-shrink:0}
.stabs::-webkit-scrollbar{height:0}
.stab{padding:9px 14px;font-size:12px;font-weight:600;color:var(–text2);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s;flex-shrink:0}
.stab.active{color:var(–accent);border-bottom-color:var(–accent)}
.sbody{overflow-y:auto;padding:14px;flex:1}
.sbody::-webkit-scrollbar{width:3px}
.sbody::-webkit-scrollbar-thumb{background:var(–border);border-radius:3px}
.snav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:8px 13px;background:var(–surface2);border-radius:8px;border:1px solid var(–border)}
.sarr{background:none;border:none;color:var(–accent);font-size:22px;cursor:pointer;padding:0 4px;line-height:1}
.slbl{font-weight:700;font-size:14px}
.ctabs{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.ctab{padding:4px 10px;border-radius:14px;font-size:11px;font-weight:600;cursor:pointer;background:var(–surface2);border:1px solid var(–border);color:var(–text2);transition:all .15s}
.ctab.active{background:rgba(0,229,160,.1);border-color:var(–accent);color:var(–accent)}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px}
.sc{background:var(–surface2);border:1px solid var(–border);border-radius:10px;padding:11px 6px;text-align:center}
.scv{font-family:‘Bebas Neue’,cursive;font-size:28px;color:var(–accent);line-height:1}
.scl{font-size:9px;color:var(–text3);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.sc.y .scv{color:var(–yellow)}.sc.r .scv{color:var(–red)}.sc.g .scv{color:var(–gold)}
.srow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(–border);font-size:13px}
.srow:last-child{border-bottom:none}
.srl{color:var(–text2)}.srv{font-weight:700}
.barrow{padding:6px 0}
.barlbl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.barlbl span:first-child{color:var(–text2)}.barlbl span:last-child{color:var(–accent);font-weight:700}
.barbg{height:4px;background:var(–surface2);border-radius:2px;overflow:hidden}
.barfill{height:100%;background:linear-gradient(90deg,var(–accent2),var(–accent));border-radius:2px;transition:width .6s ease}
.mpoint{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(–border);font-size:13px}
.mpoint:last-child{border-bottom:none}
.mdate{color:var(–text3)}.mval{font-weight:700;color:var(–gold)}
.sload{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:40px 0;color:var(–text2)}
.titem{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(–surface2);border:1px solid var(–border);border-radius:8px;margin-bottom:6px;font-size:12px}
.tdate{color:var(–text3);min-width:60px;font-size:11px}
.tclub{flex:1;font-weight:600}
.tfee{color:var(–gold);font-weight:700}

#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(70px);background:var(–surface);border:1px solid var(–border);border-radius:10px;padding:9px 18px;font-size:13px;z-index:500;transition:transform .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
#toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:768px){#lp{width:200px;min-width:200px}.av{width:44px;height:44px}.pname{font-size:9px;max-width:66px}}
</style>

</head>
<body>
<div id="app">
  <div id="lp">
    <div class="ph">
      <div class="logo">Football<span>IQ</span></div>
    </div>
    <div class="sb"><input type="text" id="si" placeholder="Takım ara..." oninput="filterTeams(this.value)"></div>
    <div class="sl">Ligler</div>
    <div id="ll"></div>
  </div>
  <div id="main">
    <div id="topbar">
      <button class="hb" onclick="togglePanel()">☰</button>
      <div id="tt">Takım Seç</div>
      <div id="fsel" onclick="openFM()">
        <span style="font-size:14px">⚽</span>
        <span id="cfm">4-3-3</span>
        <span style="font-size:9px;opacity:.7">▼</span>
      </div>
    </div>
    <div id="pc">
      <div id="pw">
        <div id="pitch">
          <div class="pcl"></div><div class="pcc"></div><div class="pcd"></div>
          <div class="ppt"></div><div class="ppb"></div>
          <div class="pgt"></div><div class="pgb"></div>
          <div id="lo"><div class="spin"></div><div class="ltext" id="ltxt">Yükleniyor...</div></div>
          <div id="es"><div style="font-size:44px;opacity:.2">⚽</div><div style="font-size:13px;opacity:.5">Sol panelden bir takım seç</div></div>
          <div id="swaphint">Değiştirmek istediğin oyuncuya dokun</div>
        </div>
      </div>
      <div id="bp"><div class="bh">🪑 Yedek Oyuncular</div><div id="bs"></div></div>
    </div>
  </div>
</div>

<div id="fmod">
  <div class="fbox">
    <div class="ftitle">Diziliş Seç</div>
    <div class="fgrid" id="fgrid"></div>
    <button class="fclose" onclick="closeFM()">İptal</button>
  </div>
</div>

<div id="smod">
  <div class="sbox">
    <button class="xcbtn" onclick="closeSM()">✕</button>
    <div class="shdr" id="smhdr"></div>
    <div class="stabs" id="smtabs"></div>
    <div class="sbody" id="smbody"></div>
  </div>
</div>

<div id="toast"></div>

async function loadSquad(clubId,name){
  try{
    const json=await tmGet(`/clubs/squad?id=${clubId}`);
    const players=json.data;
    if(!Array.isArray(players)||players.length<5) throw new Error('empty');
    return sortNorm(players);
  }catch(e){
    return mockSquad(name);
  }
}
function sortNorm(players){
  return[...players].sort((a,b)=>{
    const ia=POSORDER.indexOf(a.position||'');const ib=POSORDER.indexOf(b.position||'');
    return(ia<0?99:ia)-(ib<0?99:ib);
  }).map(p=>({
    id:p.id||'',name:p.name||'?',pos:p.position||'Midfielder',
    short:POSMAP[p.position]||(p.position||'MF').substring(0,2).toUpperCase(),
    imgSrc:'',value:p.marketValue||'-',number:p.number||'',
    age:p.age?String(p.age):'',nat:p.nationality||'',foot:'',height:'',dob:''
  }));
}

// ══════════════════════════
// LOAD PHOTOS BACKGROUND
// ══════════════════════════
async function loadPhotos(squad){
  for(let i=0;i<squad.length;i++){
    const p=squad[i];
    if(!p.id)continue;
    try{
      const json=await tmGet(`/players/profile?id=${p.id}`);
      const d=json.data||json;
      const url=d.image||'';
      if(url&&!url.startsWith('data:')){
        p.imgSrc=url;
        if(d.dateOfBirth)p.dob=d.dateOfBirth;
        if(d.height)p.height=d.height;
        if(d.foot)p.foot=d.foot;
        if(d.marketValue&&p.value==='-')p.value=d.marketValue;
        // Update pitch card
        refreshCardPhoto(p.id,url,p.name,p.short);
        // Update bench card
        refreshBenchPhoto(p.id,url,p.name);
        // Update open stats modal
        if(SS.player&&SS.player.id===p.id){
          SS.player.imgSrc=url;
          const sa=document.querySelector('.savatar');
          if(sa)sa.innerHTML=`<img src="${url}" onerror="this.style.display='none'" alt="${p.name}">`;
        }
      }
    }catch(e){}
    await new Promise(r=>setTimeout(r,150));
  }
}
function refreshCardPhoto(pid,url,name,short){
  const card=document.querySelector(`.pcard[data-pid="${pid}"]`);
  if(!card)return;
  const av=card.querySelector('.av');
  const wasSelected=card.classList.contains('selected');
  av.innerHTML=`<img src="${url}" loading="lazy" onerror="this.style.display='none'" alt="${name}"><div class="posbadge">${short}</div>`;
  if(wasSelected)card.classList.add('selected');
}
function refreshBenchPhoto(pid,url,name){
  const bpl=document.querySelector(`.bpl[data-pid="${pid}"]`);
  if(!bpl)return;
  const bav=bpl.querySelector('.bav');
  bav.innerHTML=`<img src="${url}" loading="lazy" onerror="this.style.display='none'" alt="${name}">`;
}

function renderPitch(){
  const pitch=document.getElementById('pitch');
  pitch.querySelectorAll('.pcard').forEach(e=>e.remove());
  const slots=FSLOTS[ST.formation]||FSLOTS['4-3-3'];
  ST.starters.slice(0,11).forEach((p,i)=>{
    const s=ST.overrides[i]||{x:slots[i][0],y:slots[i][1]};
    pitch.appendChild(makeCard(p,i,s.x,s.y));
  });
}

function makeCard(p,idx,x,y){
  const d=document.createElement('div');
  d.className='pcard';d.style.left=x+'%';d.style.top=y+'%';
  d.dataset.pid=p.id;d.dataset.idx=idx;
  const imgContent=p.imgSrc
    ?`<img src="${p.imgSrc}" loading="lazy" onerror="this.style.display='none'" alt="${p.name}">`
    :`<div class="av-init">${initials(p.name)}</div>`;
  d.innerHTML=`<div class="av">${imgContent}<div class="posbadge">${p.short}</div></div><div class="pname">${lastName(p.name)}</div><div class="pval">${p.value||'-'}</div>`;

  d.addEventListener('click',e=>{
    e.stopPropagation();
    handleCardClick('pitch',idx,p,d);
  });

  setupDrag(d,idx);
  return d;
}

// ══════════════════════════
// SWAP LOGIC
// ══════════════════════════
function handleCardClick(type,idx,p,el){
  // If nothing selected → select this
  if(!ST.selected){
    ST.selected={type,idx};
    el.classList.add('selected');
    showSwapHint(true);
    addSwapTargetHints(type,idx);
    return;
  }
  // If same element → deselect
  const same=(ST.selected.type===type&&ST.selected.idx===idx);
  if(same){
    clearSwapUI();
    return;
  }
  // Different element → SWAP
  doSwap(ST.selected, {type,idx});
}

function doSwap(a, b){
  // a and b are {type:'pitch'|'bench', idx}
  let pa = a.type==='pitch' ? ST.starters[a.idx] : ST.bench[a.idx];
  let pb = b.type==='pitch' ? ST.starters[b.idx] : ST.bench[b.idx];

  // Swap in arrays
  if(a.type==='pitch') ST.starters[a.idx]=pb;
  else ST.bench[a.idx]=pb;

  if(b.type==='pitch') ST.starters[b.idx]=pa;
  else ST.bench[b.idx]=pa;

  clearSwapUI();
  renderPitch();
  renderBench();
  showToast(`${lastName(pa.name)} ↔ ${lastName(pb.name)}`);
}

function addSwapTargetHints(selType,selIdx){
  // Hint all other pitch cards
  document.querySelectorAll('.pcard').forEach(c=>{
    if(parseInt(c.dataset.idx)!==selIdx||selType!=='pitch') c.classList.add('swap-target');
  });
  // Hint all bench players
  document.querySelectorAll('.bpl').forEach(b=>{
    if(parseInt(b.dataset.idx)!==selIdx||selType!=='bench') b.classList.add('swap-target');
  });
}

function clearSwapUI(){
  ST.selected=null;
  document.querySelectorAll('.pcard').forEach(c=>c.classList.remove('selected','swap-target'));
  document.querySelectorAll('.bpl').forEach(b=>b.classList.remove('selected','swap-target'));
  showSwapHint(false);
}

function showSwapHint(v){
  document.getElementById('swaphint').classList.toggle('show',v);
}

// Click on pitch background → deselect
document.getElementById('pitch')?.addEventListener('click',e=>{
  if(e.target.id==='pitch'||e.target.classList.contains('pcl')||
     e.target.classList.contains('pcc')||e.target.classList.contains('pcd')){
    clearSwapUI();
  }
});

// ══════════════════════════
// DRAG (hold to drag, tap to select)
// ══════════════════════════
function setupDrag(card,idx){
  let drag=false,sx,sy,sl,st2,ht,moved=false;
  const gp=()=>document.getElementById('pitch');
  const start=(cx,cy)=>{
    moved=false;
    ht=setTimeout(()=>{
      drag=true;card.classList.add('drag');
      sl=parseFloat(card.style.left);st2=parseFloat(card.style.top);sx=cx;sy=cy;
    },300);
  };
  const move=(cx,cy)=>{
    if(!drag)return;moved=true;
    const r=gp().getBoundingClientRect();
    const nx=Math.max(4,Math.min(96,sl+(cx-sx)/r.width*100));
    const ny=Math.max(4,Math.min(96,st2+(cy-sy)/r.height*100));
    card.style.left=nx+'%';card.style.top=ny+'%';
    ST.overrides[idx]={x:nx,y:ny};
  };
  const end=()=>{clearTimeout(ht);drag=false;card.classList.remove('drag')};
  card.addEventListener('touchstart',e=>{start(e.touches[0].clientX,e.touches[0].clientY)},{passive:true});
  card.addEventListener('touchmove',e=>{e.preventDefault();move(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});
  card.addEventListener('touchend',end);
  card.addEventListener('mousedown',e=>start(e.clientX,e.clientY));
  document.addEventListener('mousemove',e=>move(e.clientX,e.clientY));
  document.addEventListener('mouseup',end);
}

function renderBench(){
  document.getElementById('bs').innerHTML=ST.bench.map((p,i)=>{
    const imgContent=p.imgSrc
      ?`<img src="${p.imgSrc}" loading="lazy" onerror="this.style.display='none'" alt="${p.name}">`
      :`<div class="bav-init">${initials(p.name)}</div>`;
    return`<div class="bpl" data-pid="${p.id}" data-idx="${i}" onclick="handleBenchClick(${i},this)">
      <div class="bav">${imgContent}</div>
      <div class="bname">${lastName(p.name)}</div>
      <div class="bpos">${p.short}</div>
    </div>`;
  }).join('');
}

function handleBenchClick(idx,el){
  const p=ST.bench[idx];
  // If something selected on pitch → swap
  if(ST.selected&&ST.selected.type==='pitch'){
    doSwap(ST.selected,{type:'bench',idx});
    return;
  }
  // If same bench player selected → deselect
  if(ST.selected&&ST.selected.type==='bench'&&ST.selected.idx===idx){
    clearSwapUI();
    return;
  }
  // If another bench player selected → swap bench to bench
  if(ST.selected&&ST.selected.type==='bench'){
    doSwap(ST.selected,{type:'bench',idx});
    return;
  }
  // Nothing selected:
  // Short tap = select for swap
  ST.selected={type:'bench',idx};
  el.classList.add('selected');
  showSwapHint(true);
  addSwapTargetHints('bench',idx);
}

async function drawTab(i){
  const p=SS.player;

    const key=`s_${p.id}_${SS.si}_${SS.ci}`;
    if(!SS.cache[key]){
      document.getElementById('smbody').innerHTML='<div class="sload"><div class="spin"></div><div>İstatistikler yükleniyor...</div></div>';
      SS.cache[key]=mockStats(p,SEASONS[SS.si],COMPS[SS.ci]);
    }
    i===0?drawMain(SS.cache[key],p):drawDetail(SS.cache[key]);
  }else if(i===2){await drawTransfers(p)}
  else if(i===3){await drawMarket(p)}
  else{drawProfile(p)}
}

async function drawTransfers(p){
  document.getElementById('smbody').innerHTML='<div class="sload"><div class="spin"></div><div>Transferler yükleniyor...</div></div>';
  try{
    const d=await tmGet(`/players/transfers?id=${p.id}`);
    const list=d.data||d.transfers||[];
    if(!Array.isArray(list)||!list.length) throw new Error('empty');
    document.getElementById('smbody').innerHTML=
      '<div style="font-size:10px;color:var(--text3);margin-bottom:10px;letter-spacing:1px;text-transform:uppercase">Transfer Geçmişi</div>'+
      list.slice(0,15).map(t=>`<div class="titem"><div class="tdate">${t.date||t.season||'—'}</div><div style="font-size:14px">${(t.type==='In'||t.direction==='in')?'⬅':'➡'}</div><div class="tclub">${t.from?.name||t.to?.name||t.club||'—'}</div><div class="tfee">${t.fee||t.transferFee||'—'}</div></div>`).join('');
  }catch(e){document.getElementById('smbody').innerHTML='<div style="padding:30px;text-align:center;color:var(--text3)">Transfer verisi bulunamadı</div>'}
}

async function drawMarket(p){
  document.getElementById('smbody').innerHTML='<div class="sload"><div class="spin"></div><div>Piyasa değeri yükleniyor...</div></div>';
  const hdr=`<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:14px"><div style="font-size:10px;color:var(--text3);margin-bottom:4px;letter-spacing:1px;text-transform:uppercase">Güncel Piyasa Değeri</div><div style="font-family:'Bebas Neue',cursive;font-size:36px;color:var(--gold)">${p.value||'-'}</div></div>`;
  try{
    const d=await tmGet(`/players/market-value-history?id=${p.id}`);
    const hist=d.data||d.history||[];
    if(!Array.isArray(hist)||!hist.length) throw new Error('empty');
    document.getElementById('smbody').innerHTML=hdr+'<div style="font-size:10px;color:var(--text3);margin-bottom:8px;letter-spacing:1px;text-transform:uppercase">Değer Geçmişi</div>'+
      hist.slice(0,20).map(h=>`<div class="mpoint"><span class="mdate">${h.date||h.season||h.year||'—'}</span><span class="mval">${h.value||h.marketValue||'—'}</span></div>`).join('');
  }catch(e){document.getElementById('smbody').innerHTML=hdr+'<div style="padding:20px;text-align:center;color:var(--text3)">Geçmiş verisi bulunamadı</div>'}
}

function drawProfile(p){
  const rows=[['Ad Soyad',p.name],p.number?['Forma No','#'+p.number]:null,p.dob?['Doğum',p.dob]:p.age?['Yaş',p.age]:null,['Mevki',p.pos],p.nat?['Uyruk',p.nat]:null,p.foot?['Ayak',p.foot]:null,p.height?['Boy',p.height]:null,['Piyasa Değeri',`<span style="color:var(--gold)">${p.value||'-'}</span>`],p.id?['Transfermarkt',`<a href="https://www.transfermarkt.com/xxx/profil/spieler/${p.id}" target="_blank" style="color:var(--accent2)">Profili Gör →</a>`]:null].filter(Boolean);
  document.getElementById('smbody').innerHTML=rows.map(([l,v])=>`<div class="srow"><span class="srl">${l}</span><span class="srv">${v}</span></div>`).join('');
}

// ══════════════════════════
// STATS (mock)
// ══════════════════════════
function srd(seed,min,max){const s=seed%2147483647;return Math.floor(((s*16807+49297)%233280)/233280*(max-min+1)+min)}
function mockStats(p,season,comp){
  const seed=(p.name+season+comp).split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  const r=(a,b)=>srd(seed+a*7+b*3,a,b);
  const isGK=p.pos==='Goalkeeper';const isFW=['Centre-Forward','Forward','Left Winger','Right Winger','Attacking Midfield'].includes(p.pos);const isDef=['Centre-Back','Left-Back','Right-Back','Defender'].includes(p.pos);
  const m=r(14,34);
  return{matches:m,goals:isGK?0:isFW?r(3,28):isDef?r(0,4):r(1,10),assists:isGK?0:isFW?r(2,16):isDef?r(0,5):r(2,12),yellow:r(0,8),red:r(0,2),minutes:m*r(60,90),rating:(r(60,90)/10).toFixed(1),shotsPG:(r(5,35)/10).toFixed(1),passPct:r(70,96),dribbles:(r(0,30)/10).toFixed(1),aerialsW:r(30,76),tackles:r(10,80),interceptions:r(5,50),savesPct:isGK?r(62,86):null,cleanSheets:isGK?r(3,18):null,keyPasses:r(10,80),chancesC:r(5,42),xG:isFW?(r(50,280)/100).toFixed(2):(r(5,100)/100).toFixed(2),xA:isFW?(r(30,150)/100).toFixed(2):(r(5,80)/100).toFixed(2),distCovered:(r(80,120)/10).toFixed(1),foulsC:r(10,60),foulsW:r(5,50),offsides:isFW?r(0,20):0,crosses:r(0,60)};
}
function drawMain(s,p){
  const isGK=p.pos==='Goalkeeper';
  document.getElementById('smbody').innerHTML=`
    <div class="snav"><button class="sarr" onclick="chS(-1)">‹</button><span class="slbl">${SEASONS[SS.si]}</span><button class="sarr" onclick="chS(1)">›</button></div>
    <div class="ctabs">${COMPS.map((c,i)=>`<div class="ctab ${i===SS.ci?'active':''}" onclick="chC(${i},this)">${c}</div>`).join('')}</div>
    <div class="sgrid">
      <div class="sc"><div class="scv">${s.matches}</div><div class="scl">Maç</div></div>
      <div class="sc"><div class="scv">${s.goals}</div><div class="scl">Gol</div></div>
      <div class="sc"><div class="scv">${s.assists}</div><div class="scl">Asist</div></div>
      <div class="sc y"><div class="scv">${s.yellow}</div><div class="scl">Sarı Kart</div></div>
      <div class="sc r"><div class="scv">${s.red}</div><div class="scl">Kırmızı Kart</div></div>
      <div class="sc g"><div class="scv">${s.rating}</div><div class="scl">Puan</div></div>
    </div>
    <div class="srow"><span class="srl">Toplam Dakika</span><span class="srv">${s.minutes}'</span></div>
    ${isGK?`<div class="srow"><span class="srl">Kurtarış %</span><span class="srv">${s.savesPct}%</span></div><div class="srow"><span class="srl">Gol Yememe</span><span class="srv">${s.cleanSheets}</span></div>`:`<div class="srow"><span class="srl">Gol + Asist</span><span class="srv">${s.goals+s.assists}</span></div><div class="srow"><span class="srl">xG</span><span class="srv">${s.xG}</span></div><div class="srow"><span class="srl">xA</span><span class="srv">${s.xA}</span></div>`}
    <div class="srow"><span class="srl">Kilit Pas</span><span class="srv">${s.keyPasses}</span></div>
    <div class="srow"><span class="srl">Yaratılan Fırsat</span><span class="srv">${s.chancesC}</span></div>
    <div class="srow"><span class="srl">Mesafe</span><span class="srv">${s.distCovered} km/maç</span></div>`;
}
function drawDetail(s){
  const bars=[{l:'Pas İsabeti',v:+s.passPct||0,m:100},{l:'Hava Topu %',v:+s.aerialsW||0,m:100},{l:'Taklel',v:+s.tackles||0,m:100},{l:'Top Kapma',v:+s.interceptions||0,m:100},{l:'Çapraz Pas',v:+s.crosses||0,m:80},{l:'Şut/maç x10',v:Math.round((+s.shotsPG||0)*10),m:35},{l:'Frikik Yaptırma',v:+s.foulsW||0,m:60}];
  document.getElementById('smbody').innerHTML=`<div class="srow"><span class="srl">Faul</span><span class="srv">${s.foulsC}</span></div><div class="srow"><span class="srl">Ofsayt</span><span class="srv">${s.offsides}</span></div><div class="srow"><span class="srl">Dribling</span><span class="srv">${s.dribbles}/maç</span></div><hr style="border-color:var(--border);margin:10px 0">${bars.map(b=>`<div class="barrow"><div class="barlbl"><span>${b.l}</span><span>${b.v}${b.m===100?'%':''}</span></div><div class="barbg"><div class="barfill" style="width:${Math.min(100,(b.v/b.m*100)).toFixed(1)}%"></div></div></div>`).join('')}`;
}
async function chS(d){SS.si=Math.max(0,Math.min(SEASONS.length-1,SS.si+d));SS.cache={};await drawTab(ST.ctab)}
async function chC(i,el){SS.ci=i;document.querySelectorAll('.ctab').forEach(t=>t.classList.remove('active'));el.classList.add('active');SS.cache={};await drawTab(ST.ctab)}

// ══════════════════════════
// MOCK SQUAD
// ══════════════════════════
const MFN=['Ahmet','Emre','Kerem','Ozan','Hakan','Arda','Serdar','Lucas','Marco','Carlos','João','Kevin','Leon','Kylian','Erling','Vinicius','Phil','Bukayo','Gavi','Pedri'];
const MLN=['Yılmaz','Demir','Çelik','Güler','Kabak','Müller','Hernandez','Alves','Fernandez','Modric','Salah','Kane','Bellingham','Haaland','Saka','Rice','Wirtz','Musiala','Mbappe','Osimhen'];
const MPOS=[{p:'Goalkeeper',s:'GK'},{p:'Centre-Back',s:'CB'},{p:'Centre-Back',s:'CB'},{p:'Left-Back',s:'LB'},{p:'Right-Back',s:'RB'},{p:'Central Midfield',s:'CM'},{p:'Central Midfield',s:'CM'},{p:'Attacking Midfield',s:'AM'},{p:'Left Winger',s:'LW'},{p:'Right Winger',s:'RW'},{p:'Centre-Forward',s:'CF'},{p:'Goalkeeper',s:'GK'},{p:'Centre-Back',s:'CB'},{p:'Left-Back',s:'LB'},{p:'Central Midfield',s:'CM'},{p:'Attacking Midfield',s:'AM'},{p:'Centre-Forward',s:'CF'}];
const MVALS=['3 Mio. €','5 Mio. €','8 Mio. €','12 Mio. €','15 Mio. €','20 Mio. €','25 Mio. €','35 Mio. €','50 Mio. €','70 Mio. €','100 Mio. €'];
const MNATS=['Türkiye','Brezilya','Arjantin','Fransa','İspanya','Almanya','İtalya','Hollanda','İngiltere'];
function srnd(s){let x=s%2147483647;return()=>{x=(x*16807)%2147483647;return(x-1)/2147483646}}
function mockSquad(name){
  const r=srnd(name.split('').reduce((a,c)=>a+c.charCodeAt(0),0));
  const pick=a=>a[Math.floor(r()*a.length)];
  return MPOS.map((p,i)=>({id:String(i),name:pick(MFN)+' '+pick(MLN),pos:p.p,short:p.s,imgSrc:'',value:pick(MVALS),number:String(i+1),age:String(18+Math.floor(r()*18)),nat:pick(MNATS),foot:'',height:'',dob:''}));
}

function showL(v,msg){document.getElementById('lo').style.display=v?'flex':'none';if(msg)document.getElementById('ltxt').textContent=msg}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500)}
function togglePanel(){document.getElementById('lp').classList.toggle('col')}

document.getElementById('fmod').addEventListener('click',e=>{if(e.target.id==='fmod')closeFM()});
document.getElementById('smod').addEventListener('click',e=>{if(e.target.id==='smod')closeSM()});

init();
